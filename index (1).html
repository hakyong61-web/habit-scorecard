<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>습관 스코어카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);min-height:100vh;color:#e2e8f0;font-size:13px}
.header{background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.08);padding:16px 20px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo-sub{font-size:10px;color:#8B5CF6;letter-spacing:3px;font-weight:700;text-transform:uppercase}
.logo-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.save-badge{font-size:10px;padding:4px 12px;border-radius:20px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);color:#10B981;font-weight:700}
.ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
.tabs{display:flex;gap:2px}
.tab{flex:1;padding:9px 0;font-size:11px;font-weight:700;background:transparent;color:#94a3b8;border:none;border-bottom:2px solid transparent;cursor:pointer;border-radius:4px 4px 0 0;transition:all 0.2s;font-family:inherit}
.tab.active{background:rgba(139,92,246,0.3);color:#a78bfa;border-bottom:2px solid #8B5CF6}
.body{padding:16px 14px 40px}
.view-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.toggle-group{display:flex;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px;gap:2px}
.toggle-btn{padding:5px 16px;border-radius:6px;font-size:11px;font-weight:700;background:transparent;color:#94a3b8;border:none;cursor:pointer;transition:all 0.2s;font-family:inherit}
.toggle-btn.active{background:#8B5CF6;color:#fff}
.nav{display:flex;align-items:center;gap:8px}
.nav-btn{background:rgba(255,255,255,0.08);border:none;color:#e2e8f0;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;font-family:inherit}
.nav-label{font-weight:700;font-size:13px}
.grid-wrap{background:rgba(255,255,255,0.03);border-radius:14px;border:1px solid rgba(255,255,255,0.07);overflow-x:auto}
.month-grid{display:grid;min-width:max-content}
.grid-cell{display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:30px;border-left:1px solid rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.1s}
.check-empty{width:17px;height:17px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.02)}
.check-done{width:17px;height:17px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px}
.week-header-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid rgba(255,255,255,0.07)}
.week-cells{display:grid;grid-template-columns:repeat(7,1fr)}
.week-cell{height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.1s}
.stat-card{background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(59,130,246,0.15));border:1px solid rgba(139,92,246,0.3);border-radius:14px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:18px}
.habit-stat-item{background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(255,255,255,0.06);padding:12px 14px;margin-bottom:8px}
.progress-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.heatmap-wrap{margin-top:16px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.07);padding:14px}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heatmap-day{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.add-row{display:flex;gap:8px;margin-bottom:16px}
.add-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:9px;padding:9px 12px;color:#e2e8f0;font-size:12px;outline:none;font-family:inherit}
.add-btn{background:#8B5CF6;border:none;border-radius:9px;padding:9px 14px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit}
.habit-row-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(255,255,255,0.07);padding:10px 14px;margin-bottom:7px}
.edit-btn{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:5px;padding:3px 8px;color:#3B82F6;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit}
.del-btn{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:5px;padding:3px 8px;color:#EF4444;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit}
.entropy-box{margin-top:16px;padding:14px;background:rgba(139,92,246,0.07);border:1px solid rgba(139,92,246,0.18);border-radius:10px}
.save-info-box{margin-top:16px;padding:14px;background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);border-radius:10px}
.action-btn{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
/* 수정 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#1e1b4b;border:1px solid rgba(139,92,246,0.3);border-radius:16px;padding:24px;width:90%;max-width:360px}
.modal-title{font-size:15px;font-weight:800;margin-bottom:16px;color:#a78bfa}
.modal-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:9px;padding:10px 14px;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit;margin-bottom:14px}
.modal-btns{display:flex;gap:8px}
.modal-save{flex:1;padding:10px;background:#8B5CF6;border:none;border-radius:9px;color:#fff;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit}
.modal-cancel{flex:1;padding:10px;background:rgba(255,255,255,0.08);border:none;border-radius:9px;color:#94a3b8;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <div class="logo-sub">VISION CARD</div>
      <div class="logo-title">습관 스코어카드</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="save-badge" id="saveBadge">💾 자동저장 ON</span>
      <div class="ring-wrap" id="headerRing"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('tracker')">📋 트래커</button>
    <button class="tab" onclick="setTab('stats')">📊 통계</button>
    <button class="tab" onclick="setTab('settings')">⚙️ 습관관리</button>
  </div>
</div>
<div class="body" id="mainBody"></div>

<!-- 수정 모달 -->
<div class="modal-bg" id="editModal" style="display:none;">
  <div class="modal">
    <div class="modal-title">✏️ 습관 수정</div>
    <input class="modal-input" id="editInput" placeholder="새 이름 입력">
    <div class="modal-btns">
      <button class="modal-save" onclick="saveEdit()">저장</button>
      <button class="modal-cancel" onclick="closeEdit()">취소</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='hsc_v3';
const MONTH_NAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAY_NAMES=['일','월','화','수','목','금','토'];
const COLORS=['#8B5CF6','#3B82F6','#10B981','#F59E0B','#06B6D4','#EC4899','#6366F1','#EF4444','#F97316','#14B8A6'];
const DEFAULT_HABITS=[
  {id:1,name:'🧘 좌선 20분/일',color:'#8B5CF6'},
  {id:2,name:'📚 배움 2시간/일',color:'#3B82F6'},
  {id:3,name:'🤝 봉사 1시간/일',color:'#10B981'},
  {id:4,name:'💪 운동 2시간/일',color:'#F59E0B'},
  {id:5,name:'💻 디지털 2시간/일',color:'#06B6D4'},
  {id:6,name:'🙏 감사 10분/일',color:'#EC4899'},
  {id:7,name:'🌙 숙면 6시간/일',color:'#6366F1'},
  {id:8,name:'🩸 혈당 150/월목',color:'#EF4444'},
  {id:9,name:'🏃 런닝 30분/주',color:'#F97316'},
  {id:10,name:'🏔️ 산행 2시간/격주',color:'#14B8A6'},
];

function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({habits:state.habits,checks:state.checks,year:state.year,month:state.month}));
    const b=document.getElementById('saveBadge');
    if(b){b.textContent='✅ 저장됨';clearTimeout(window._t);window._t=setTimeout(()=>{b.textContent='💾 자동저장 ON';},1500);}
  }catch(e){}
}

const today=new Date();
const saved=loadState();
const state={
  habits:saved?.habits||DEFAULT_HABITS,
  checks:saved?.checks||{},
  year:saved?.year||today.getFullYear(),
  month:saved?.month||today.getMonth(),
  view:'month',tab:'tracker',newName:'',
  editingId:null
};

const daysIn=(y,m)=>new Date(y,m+1,0).getDate();
const firstDay=(y,m)=>new Date(y,m,1).getDay();
const makeKey=(y,m,d,hid)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}-${hid}`;
const isChk=(y,m,d,hid)=>!!state.checks[makeKey(y,m,d,hid)];
const sc=p=>p>=80?'#10B981':p>=50?'#F59E0B':'#EF4444';
const dayScore=(y,m,d)=>state.habits.filter(h=>isChk(y,m,d,h.id)).length;
const getWeekDates=()=>{const c=new Date(today),f=new Date(c.setDate(c.getDate()-c.getDay()));return Array.from({length:7},(_,i)=>{const d=new Date(f);d.setDate(f.getDate()+i);return d;});};
const calcStats=()=>{const days=daysIn(state.year,state.month);let done=0;for(let d=1;d<=days;d++)state.habits.forEach(h=>{if(isChk(state.year,state.month,d,h.id))done++;});const total=state.habits.length*days;return{done,total,pct:total?Math.round(done/total*100):0,days};};

function makeRing(pct,size,sw){
  const r=(size-sw*2)/2,circ=2*Math.PI*r,off=circ-circ*pct/100,color=sc(pct);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="position:absolute;top:0;left:0;">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:all 0.5s;"/>
  </svg>
  <div style="position:absolute;inset:${sw+2}px;border-radius:50%;background:#1a1535;display:flex;align-items:center;justify-content:center;">
    <span style="font-size:${size>60?18:12}px;font-weight:900;color:${color};">${pct}%</span>
  </div>`;
}

// ── 수정 모달 ──
function openEdit(id){
  state.editingId=id;
  const h=state.habits.find(h=>h.id===id);
  if(!h)return;
  const modal=document.getElementById('editModal');
  const inp=document.getElementById('editInput');
  inp.value=h.name;
  modal.style.display='flex';
  setTimeout(()=>inp.focus(),100);
}
function closeEdit(){
  document.getElementById('editModal').style.display='none';
  state.editingId=null;
}
function saveEdit(){
  const inp=document.getElementById('editInput');
  const name=inp.value.trim();
  if(!name)return;
  state.habits=state.habits.map(h=>h.id===state.editingId?{...h,name}:h);
  saveState();closeEdit();render();
}
// 엔터키로 저장
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&state.editingId)saveEdit();
  if(e.key==='Escape')closeEdit();
});

function setTab(t){state.tab=t;render();}
function setView(v){state.view=v;render();}
function prevMonth(){if(state.month===0){state.month=11;state.year--;}else state.month--;saveState();render();}
function nextMonth(){if(state.month===11){state.month=0;state.year++;}else state.month++;saveState();render();}
function toggle(y,m,d,hid){state.checks[makeKey(y,m,d,hid)]=!isChk(y,m,d,hid);saveState();render();}
function addHabit(){const inp=document.getElementById('newHabitInp');const name=inp?inp.value.trim():'';if(!name)return;state.habits.push({id:Date.now(),name,color:COLORS[state.habits.length%COLORS.length]});state.newName='';saveState();render();}
function removeHabit(id){if(!confirm('이 습관을 삭제할까요?'))return;state.habits=state.habits.filter(h=>h.id!==id);saveState();render();}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({habits:state.habits,checks:state.checks},null,2)],{type:'application/json'}));a.download=`habit-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();}
function resetChecks(){if(!confirm('모든 체크 기록을 삭제할까요?'))return;state.checks={};saveState();render();}

function render(){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['tracker','stats','settings'][i]===state.tab));
  const{pct}=calcStats();
  const hr=document.getElementById('headerRing');
  if(hr){hr.style.cssText='position:relative;width:52px;height:52px;flex-shrink:0;';hr.innerHTML=makeRing(pct,52,5);}
  const body=document.getElementById('mainBody');
  if(!body)return;
  if(state.tab==='tracker')body.innerHTML=renderTracker();
  else if(state.tab==='stats')body.innerHTML=renderStats();
  else body.innerHTML=renderSettings();
  const inp=document.getElementById('newHabitInp');
  if(inp){inp.value=state.newName;inp.addEventListener('input',e=>{state.newName=e.target.value;});inp.addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});}
}

function renderTracker(){
  const{year:y,month:m,habits,view}=state,days=daysIn(y,m);
  let html=`<div class="view-bar"><div class="toggle-group">
    <button class="toggle-btn ${view==='month'?'active':''}" onclick="setView('month')">월간</button>
    <button class="toggle-btn ${view==='week'?'active':''}" onclick="setView('week')">주간</button>
  </div>`;
  if(view==='month'){html+=`<div class="nav"><button class="nav-btn" onclick="prevMonth()">‹</button><span class="nav-label">${y}년 ${MONTH_NAMES[m]}</span><button class="nav-btn" onclick="nextMonth()">›</button></div>`;}
  else{html+=`<span style="font-weight:700;font-size:12px;">이번 주</span>`;}
  html+=`</div>`;

  if(view==='month'){
    const cols=`130px repeat(${days},minmax(26px,1fr))`;
    html+=`<div class="grid-wrap"><div class="month-grid" style="grid-template-columns:${cols};">`;
    html+=`<div style="padding:8px 10px;font-size:10px;color:#64748b;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.07);">습관</div>`;
    for(let d=1;d<=days;d++){
      const dow=new Date(y,m,d).getDay(),isTod=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
      const c=isTod?'#8B5CF6':dow===0?'#EF4444':dow===6?'#3B82F6':'#64748b';
      html+=`<div style="padding:5px 1px;text-align:center;font-size:9px;font-weight:700;color:${c};${isTod?'background:rgba(139,92,246,0.1);':''}border-left:1px solid rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.07);">${d}<br><span style="font-size:8px;">${DAY_NAMES[dow]}</span></div>`;
    }
    habits.forEach(h=>{
      // ★ 습관 이름 글자 굵게 font-weight:800 적용
      html+=`<div style="padding:6px 10px;font-size:11px;font-weight:800;display:flex;align-items:center;gap:5px;border-bottom:1px solid rgba(255,255,255,0.04);color:#e2e8f0;">
        <div style="width:3px;height:18px;border-radius:2px;background:${h.color};flex-shrink:0;"></div>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h.name}</span>
      </div>`;
      for(let d=1;d<=days;d++){
        const chk=isChk(y,m,d,h.id);
        html+=`<div class="grid-cell" style="background:${chk?h.color+'22':'transparent'};" onclick="toggle(${y},${m},${d},${h.id})">${chk?`<div class="check-done" style="background:${h.color};box-shadow:0 0 6px ${h.color}66;">✓</div>`:`<div class="check-empty"></div>`}</div>`;
      }
    });
    html+=`<div style="padding:6px 10px;font-size:10px;color:#64748b;font-weight:700;display:flex;align-items:center;background:rgba(255,255,255,0.02);">일별점수</div>`;
    for(let d=1;d<=days;d++){
      const s=dayScore(y,m,d),p=habits.length?Math.round(s/habits.length*100):0;
      const bg=p>=80?'rgba(16,185,129,0.22)':p>=50?'rgba(245,158,11,0.17)':s>0?'rgba(239,68,68,0.12)':'transparent';
      html+=`<div style="display:flex;align-items:center;justify-content:center;padding:5px 1px;font-size:9px;font-weight:800;border-left:1px solid rgba(255,255,255,0.04);background:${bg};color:${sc(p)};">${s>0?s:'·'}</div>`;
    }
    html+=`</div></div>`;
  } else {
    const wk=getWeekDates();
    html+=`<div class="grid-wrap"><div class="week-header-row">`;
    wk.forEach((d,i)=>{
      const isTod=d.toDateString()===today.toDateString(),s=dayScore(d.getFullYear(),d.getMonth(),d.getDate());
      html+=`<div style="padding:10px 4px;text-align:center;${isTod?'background:rgba(139,92,246,0.1);':''}${i>0?'border-left:1px solid rgba(255,255,255,0.06);':''}">
        <div style="font-size:9px;font-weight:700;color:${i===0?'#EF4444':i===6?'#3B82F6':'#94a3b8'};">${DAY_NAMES[i]}</div>
        <div style="font-size:17px;font-weight:800;color:${isTod?'#a78bfa':'#e2e8f0'};margin-top:2px;">${d.getDate()}</div>
        <div style="font-size:8px;color:#64748b;margin-top:1px;">${s}/${habits.length}</div>
      </div>`;
    });
    html+=`</div>`;
    habits.forEach(h=>{
      html+=`<div style="border-bottom:1px solid rgba(255,255,255,0.04);">
        <div style="padding:5px 10px;font-size:11px;font-weight:800;color:#e2e8f0;display:flex;align-items:center;gap:5px;border-bottom:1px solid rgba(255,255,255,0.03);">
          <div style="width:7px;height:7px;border-radius:2px;background:${h.color};"></div>${h.name}
        </div>
        <div class="week-cells">`;
      wk.forEach((d,i)=>{
        const chk=isChk(d.getFullYear(),d.getMonth(),d.getDate(),h.id),isTod=d.toDateString()===today.toDateString();
        html+=`<div class="week-cell" style="background:${chk?h.color+'22':isTod?'rgba(139,92,246,0.05)':'transparent'};${i>0?'border-left:1px solid rgba(255,255,255,0.04);':''}" onclick="toggle(${d.getFullYear()},${d.getMonth()},${d.getDate()},${h.id})">
          ${chk?`<div style="width:27px;height:27px;border-radius:7px;background:linear-gradient(135deg,${h.color},${h.color}bb);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 10px ${h.color}44;">✓</div>`
               :`<div style="width:27px;height:27px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.02);"></div>`}
        </div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }
  return html;
}

function renderStats(){
  const{year:y,month:m,habits}=state,{done,total,pct,days}=calcStats();
  const msg=pct>=80?'🌟 훌륭합니다! 엔트로피를 이기고 있어요':pct>=50?'💪 좋아요! 꾸준함이 승리입니다':'🔥 지금이 시작입니다. 작은 습관부터!';
  let html=`<div class="nav" style="margin-bottom:14px;"><button class="nav-btn" onclick="prevMonth()">‹</button><span class="nav-label">${y}년 ${MONTH_NAMES[m]}</span><button class="nav-btn" onclick="nextMonth()">›</button></div>
  <div class="stat-card"><div style="position:relative;width:76px;height:76px;flex-shrink:0;">${makeRing(pct,76,6)}</div>
  <div><div style="font-size:12px;color:#94a3b8;margin-bottom:4px;">이번 달 전체 실천율</div><div style="font-size:24px;font-weight:900;">${done}<span style="font-size:13px;color:#64748b;font-weight:400;"> / ${total}</span></div><div style="font-size:11px;color:#64748b;margin-top:4px;">${msg}</div></div></div>`;
  const hStats=habits.map(h=>{let d=0;for(let dd=1;dd<=days;dd++)if(isChk(y,m,dd,h.id))d++;return{...h,done:d,pct:Math.round(d/days*100)};}).sort((a,b)=>b.pct-a.pct);
  hStats.forEach(h=>{
    html+=`<div class="habit-stat-item"><div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;"><div style="width:7px;height:7px;border-radius:2px;background:${h.color};"></div>${h.name}</div>
      <div style="display:flex;align-items:center;gap:6px;"><span style="font-size:11px;color:#64748b;">${h.done}일/${days}일</span><span style="font-size:13px;font-weight:800;color:${sc(h.pct)};">${h.pct}%</span></div>
    </div><div class="progress-track"><div class="progress-fill" style="width:${h.pct}%;background:linear-gradient(90deg,${h.color},${h.color}bb);box-shadow:0 0 6px ${h.color}55;"></div></div></div>`;
  });
  const fd=firstDay(y,m);
  html+=`<div class="heatmap-wrap"><div style="font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:10px;">📅 일별 달성 현황</div><div class="heatmap-grid">`;
  DAY_NAMES.forEach(d=>{html+=`<div style="text-align:center;font-size:9px;color:#475569;padding-bottom:3px;font-weight:700;">${d}</div>`;});
  for(let i=0;i<fd;i++)html+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const s=dayScore(y,m,d),p=habits.length?s/habits.length:0,isTod=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
    const bg=p>=0.8?'rgba(16,185,129,0.3)':p>=0.5?'rgba(245,158,11,0.25)':p>0?'rgba(239,68,68,0.2)':'rgba(255,255,255,0.04)';
    html+=`<div class="heatmap-day" style="background:${bg};border:${isTod?'1.5px solid #8B5CF6':'1px solid rgba(255,255,255,0.04)'};"><span style="font-size:10px;font-weight:700;color:${isTod?'#a78bfa':'#e2e8f0'};">${d}</span>${s>0?`<span style="font-size:8px;color:${sc(Math.round(p*100))};">${s}</span>`:''}</div>`;
  }
  html+=`</div><div style="display:flex;gap:10px;margin-top:10px;justify-content:center;">${[['rgba(16,185,129,0.3)','80%+'],['rgba(245,158,11,0.25)','50%+'],['rgba(239,68,68,0.2)','1개+'],['rgba(255,255,255,0.04)','미실천']].map(([bg,l])=>`<div style="display:flex;align-items:center;gap:3px;"><div style="width:10px;height:10px;border-radius:2px;background:${bg};"></div><span style="font-size:9px;color:#64748b;">${l}</span></div>`).join('')}</div></div>`;
  return html;
}

function renderSettings(){
  let html=`<p style="font-size:12px;color:#94a3b8;margin-bottom:14px;line-height:1.6;">나만의 비전 기반 습관을 추가하거나 수정하세요.<br><span style="color:#8B5CF6;">각 습관은 당신의 비전카드와 연결됩니다.</span></p>
  <div class="add-row"><input class="add-input" id="newHabitInp" placeholder="새 습관 입력 (예: 🧘 명상 10분/일)"><button class="add-btn" onclick="addHabit()">+ 추가</button></div>`;
  state.habits.forEach(h=>{
    html+=`<div class="habit-row-item">
      <div style="width:10px;height:10px;border-radius:2px;background:${h.color};flex-shrink:0;"></div>
      <span style="flex:1;font-size:12px;font-weight:700;">${h.name}</span>
      <button class="edit-btn" onclick="openEdit(${h.id})">✏️ 수정</button>
      <button class="del-btn" onclick="removeHabit(${h.id})">삭제</button>
    </div>`;
  });
  html+=`<div class="entropy-box"><div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:5px;">💡 엔트로피 법칙</div><div style="font-size:11px;color:#94a3b8;line-height:1.7;">에너지를 투입하지 않으면 모든 시스템은 무질서해집니다.<br>매일 습관을 실천하는 것은 삶의 엔트로피를 낮추는 행위입니다.<br>작은 실천이 모여 비전에 가까워집니다.</div></div>
  <div class="save-info-box"><div style="font-size:11px;font-weight:700;color:#10B981;margin-bottom:5px;">💾 데이터 자동저장</div><div style="font-size:11px;color:#94a3b8;line-height:1.7;">체크한 내용이 각자 기기에 자동으로 저장됩니다.<br>앱을 닫았다 열어도 데이터가 그대로 유지됩니다.<br>링크를 공유해도 각자 데이터는 따로 저장됩니다.</div>
  <div style="display:flex;gap:8px;margin-top:10px;">
    <button class="action-btn" style="background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#10B981;" onclick="exportData()">📤 데이터 백업</button>
    <button class="action-btn" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;" onclick="resetChecks()">🗑️ 기록 초기화</button>
  </div></div>`;
  return html;
}

render();
</script>
</body>
</html>
