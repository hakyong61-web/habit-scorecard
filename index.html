<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>습관 스코어카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo-sub">VISION CARD</div>
      <div class="logo-title">습관 스코어카드</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="save-badge" id="saveBadge">💾 자동저장 ON</span>
      <div class="ring-wrap" id="headerRing"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('tracker')">📋 트래커</button>
    <button class="tab" onclick="setTab('stats')">📊 통계</button>
    <button class="tab" onclick="setTab('settings')">⚙️ 습관관리</button>
  </div>
</div>

<div class="body" id="mainBody"></div>

<script src="app.js"></script>
</body>
</html>
